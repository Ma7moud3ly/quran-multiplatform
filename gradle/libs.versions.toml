[versions]
#project
foundation = "1.10.1"
project-packageName = "com.ma7moud3ly.quran"
project-vendor = "github.com/Ma7moud3ly"
project-versionCode = "7"
project-versionName = "2.0.0" #also update at commonMain/composeResources/values/strings
android-compileSdk = "36"
android-minSdk = "24"
android-targetSdk = "36"
#plugins
agp = "9.0.1" # https://www.jetbrains.com/help/kotlin-multiplatform-dev/multiplatform-compatibility-guide.html
kotlin = "2.3.10"
ksp = "2.3.4"
composeMultiplatform = "1.10.1"
kotlinSerialization = "2.3.10"
#common
compose-material3 = "1.9.0"
compose-material-icons = "1.7.3"
ktorClientCore = "3.4.0"
media3Exoplayer = "1.9.2"
okio = "3.16.4"
serialization-json = "1.10.0"
kotlinxDatetime = "0.7.1"
androidx-lifecycle = "2.9.6"
androidx-navigation = "2.9.2"
koinCore = "4.1.1"
coilCompose = "3.3.0"
koinAnnotations = "2.3.1"
adaptive = "1.2.0"
multiplatformSettings = "1.3.0"
filekit = "0.12.0"

#android
androidx-activity = "1.12.4"
